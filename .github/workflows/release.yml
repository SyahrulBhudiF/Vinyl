name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: vn-linux-x86_64
            bin: target/release/vn
            package: true
          - os: macos-latest
            artifact: vn-macos-aarch64
            bin: target/release/vn
          - os: windows-latest
            artifact: vn-windows-x86_64.exe
            bin: target/release/vn.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev
      - run: cargo build -p vn_cli --release --features audio
      - shell: bash
        run: cp "${{ matrix.bin }}" "${{ matrix.artifact }}"
      - if: matrix.package == true
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist/deb/usr/bin dist/rpm/SOURCES dist/rpm/SPECS
          install -m 0755 target/release/vn dist/deb/usr/bin/vn
          mkdir -p dist/deb/DEBIAN
          cat > dist/deb/DEBIAN/control <<EOF
          Package: vinyl
          Version: ${version}
          Section: games
          Priority: optional
          Architecture: amd64
          Maintainer: Vinyl contributors
          Depends: libasound2, libudev1, libx11-6, libxcursor1, libxi6, libxkbcommon-x11-0, libxrandr2
          Description: Vinyl visual novel player and writer CLI
          EOF
          dpkg-deb --build dist/deb "vinyl_${version}_amd64.deb"
          cp target/release/vn dist/rpm/SOURCES/vn
          cat > dist/rpm/SPECS/vinyl.spec <<EOF
          Name: vinyl
          Version: ${version}
          Release: 1%{?dist}
          Summary: Vinyl visual novel player and writer CLI
          License: MIT
          BuildArch: x86_64

          %description
          Vinyl visual novel player and writer CLI.

          Requires: alsa-lib, libudev, libX11, libXcursor, libXi, libxkbcommon-x11, libXrandr

          %install
          mkdir -p %{buildroot}%{_bindir}
          install -m 0755 %{_sourcedir}/vn %{buildroot}%{_bindir}/vn

          %files
          %{_bindir}/vn
          EOF
          sudo apt-get update
          sudo apt-get install -y rpm
          rpmbuild --define "_topdir $PWD/dist/rpm" -bb dist/rpm/SPECS/vinyl.spec
          cp dist/rpm/RPMS/x86_64/*.rpm .
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact }}
            *.deb
            *.rpm
