name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: vn_cli-linux-x86_64
            bin: target/release/vn_cli
          - os: macos-latest
            artifact: vn_cli-macos-aarch64
            bin: target/release/vn_cli
          - os: windows-latest
            artifact: vn_cli-windows-x86_64.exe
            bin: target/release/vn_cli.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p vn_cli --release --no-default-features
      - shell: bash
        run: cp "${{ matrix.bin }}" "${{ matrix.artifact }}"
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
